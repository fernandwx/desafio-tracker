<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Desafio Reta Final</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="page">
  <div class="container">
    <header class="header">
      <div class="header-inner">
        <span class="logo">MKT <span>DOS SONHOS</span></span>
        <nav class="nav"><a href="index.html">Inicio</a></nav>
      </div>
    </header>
    <div id="app"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="config.js"></script>
<script>
const MEMBERS = ['Geovanna','Augusta','Yan'];
const DEADLINE_LABELS = {all:'Sim',partial:'Parcial',none:'Nao'};
const DEADLINE_BADGES = {all:'badge-ok',partial:'badge-partial',none:'badge-fail'};
const MEDALS = ['1', '2', '3'];
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const today = new Date().toISOString().split('T')[0];

let allEntries = [];
let currentTab = 'ranking';
let currentFilter = 'all';

function calcScore(e) {
  let s = (e.reels||0)*10 + (e.sprints||0)*1 + (e.carrosseis||0)*6;
  if (e.deadline_status === 'all') s += 15;
  else if (e.deadline_status === 'partial') s -= 10;
  else if (e.deadline_status === 'none') s -= 20;
  if (e.new_idea) s += 15;
  if (e.solved_problem) s += 20;
  if (e.helped_team && e.helped_team.trim()) s += 15;
  return s;
}

function scoreBreakdown(e) {
  const items = [];
  if (e.reels>0) items.push({label:`${e.reels} reel(s)`,pts:e.reels*10});
  if (e.sprints>0) items.push({label:`${e.sprints} sprint(s)`,pts:e.sprints});
  if (e.carrosseis>0) items.push({label:`${e.carrosseis} carrossel(is)`,pts:e.carrosseis*6});
  if (e.deadline_status==='all') items.push({label:'Tudo no prazo',pts:15});
  if (e.deadline_status==='partial') items.push({label:'Prazo parcial',pts:-10});
  if (e.deadline_status==='none') items.push({label:'Fora do prazo',pts:-20});
  if (e.new_idea) items.push({label:'Ideia nova',pts:15});
  if (e.solved_problem) items.push({label:'Problema resolvido',pts:20});
  if (e.helped_team&&e.helped_team.trim()) items.push({label:'Ajudou colega',pts:15});
  return items;
}

function renderGate() {
  document.getElementById('app').innerHTML = `
    <div class="gate">
      <div class="gate-icon">&#128274;</div>
      <h2>Acesso Restrito</h2>
      <form onsubmit="tryLogin(event)" style="display:flex;flex-direction:column;gap:10px;align-items:center">
        <input type="password" id="pwd-input" placeholder="Senha" autofocus>
        <div id="pwd-error" style="display:none" class="alert alert-error" style="margin:0;padding:8px 14px">Senha incorreta</div>
        <button type="submit" class="btn btn-primary" style="width:240px;margin-top:4px">Entrar</button>
      </form>
      <a href="index.html" style="font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em">Voltar</a>
    </div>`;
}

window.tryLogin = function(e) {
  e.preventDefault();
  const pwd = document.getElementById('pwd-input').value;
  if (pwd === ADMIN_PASSWORD) {
    sessionStorage.setItem('admin_auth','1');
    loadData();
  } else {
    document.getElementById('pwd-error').style.display='block';
    document.getElementById('pwd-input').value='';
  }
};

async function loadData() {
  document.getElementById('app').innerHTML = '<div class="loading">Carregando...</div>';
  const { data } = await client.from('entries').select('*').order('date',{ascending:false}).order('created_at',{ascending:false});
  allEntries = (data||[]).map(e => ({...e, score: calcScore(e)}));
  renderTabs();
}

function renderTabs() {
  const tabs = ['ranking','hoje','historico'];
  const tabLabels = {ranking:'Ranking',hoje:'Hoje',historico:'Historico'};
  const tabsHtml = tabs.map(t => `<button class="tab-btn ${t===currentTab?'active':''}" onclick="setTab('${t}')">${tabLabels[t]}</button>`).join('');

  let content = '';
  if (currentTab === 'ranking') content = renderRanking();
  else if (currentTab === 'hoje') content = renderHoje();
  else content = renderHistorico();

  document.getElementById('app').innerHTML = `
    <div class="tabs">${tabsHtml}</div>
    ${content}`;
}

window.setTab = function(t) { currentTab = t; renderTabs(); };
window.setFilter = function(f) { currentFilter = f; renderTabs(); };

function memberIdx(name) { return MEMBERS.indexOf(name); }

function renderRanking() {
  const totals = MEMBERS.map(name => {
    const me = allEntries.filter(e => e.user_name===name);
    return {
      name,
      totalScore: me.reduce((s,e)=>s+(e.score||0),0),
      totalReels: me.reduce((s,e)=>s+(e.reels||0),0),
      totalSprints: me.reduce((s,e)=>s+(e.sprints||0),0),
      totalCarrosseis: me.reduce((s,e)=>s+(e.carrosseis||0),0),
      days: me.length,
      avgEffort: me.length ? (me.reduce((s,e)=>s+(e.effort_score||0),0)/me.length).toFixed(1) : '-',
      ideas: me.filter(e=>e.new_idea).length,
      problems: me.filter(e=>e.solved_problem).length,
      helps: me.filter(e=>e.helped_team&&e.helped_team.trim()).length,
      entries: me
    };
  }).sort((a,b)=>b.totalScore-a.totalScore);

  const rankCards = totals.map((m,i) => `
    <div class="rank-card ${i===0?'first':''}">
      <div class="rank-pos">${MEDALS[i]}°</div>
      <div class="avatar avatar-${memberIdx(m.name)}" style="width:42px;height:42px;font-size:1rem;flex-shrink:0">${m.name[0]}</div>
      <div class="rank-info">
        <div class="rank-name">${m.name}</div>
        <div class="stat-chips">
          <span class="chip">${m.days} dias</span>
          <span class="chip">${m.totalReels} reels</span>
          <span class="chip">${m.totalSprints} sprints</span>
          <span class="chip">${m.totalCarrosseis} carrosseis</span>
          <span class="chip">Esfoco medio ${m.avgEffort}/10</span>
          ${m.ideas>0?`<span class="chip">${m.ideas} ideias</span>`:''}
          ${m.problems>0?`<span class="chip">${m.problems} prob. resolvidos</span>`:''}
          ${m.helps>0?`<span class="chip">${m.helps}x ajudou</span>`:''}
        </div>
      </div>
      <div class="rank-score">${m.totalScore} pts</div>
    </div>`).join('');

  const details = totals.map(m => {
    if (!m.entries.length) return '';
    const rows = m.entries.slice(0,5).map(e => {
      const items = scoreBreakdown(e);
      const chips = items.map(it => `<span class="chip" style="color:${it.pts>0?'var(--gold-light)':'#f87171'};border-color:${it.pts>0?'rgba(245,158,11,.3)':'rgba(239,68,68,.3)'}">${it.label}: ${it.pts>0?'+':''}${it.pts}</span>`).join('');
      return `<div style="background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:flex-start;gap:12px">
        <div>
          <div style="font-size:.75rem;color:var(--muted);margin-bottom:4px">${new Date(e.date+'T12:00:00').toLocaleDateString('pt-BR')}</div>
          <div style="display:flex;flex-wrap:wrap;gap:4px">${chips}</div>
        </div>
        <div style="font-weight:800;font-size:1.1rem;color:${e.score>=0?'var(--accent-light)':'#f87171'};flex-shrink:0">${e.score>=0?'+':''}${e.score}</div>
      </div>`;
    }).join('');
    return `<div style="margin-bottom:24px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <div class="avatar avatar-${memberIdx(m.name)}" style="width:32px;height:32px;font-size:.85rem;margin:0">${m.name[0]}</div>
        <span style="font-weight:700;font-size:.9rem">${m.name}</span>
      </div>
      ${rows}
    </div>`;
  }).join('');

  return `
    <div class="divider-label">Pontuacao acumulada</div>
    <div class="rank-list">${rankCards}</div>
    <div class="divider-label" style="margin-top:32px">Detalhamento por dia</div>
    ${details}`;
}

function renderHoje() {
  const hoje = allEntries.filter(e => e.date === today);
  if (!hoje.length) return '<div class="empty">Nenhum check-in registrado hoje.</div>';
  return `<div class="divider-label">Check-ins de hoje</div>` + hoje.map(e => `
    <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px 22px;margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div style="display:flex;align-items:center;gap:10px">
          <div class="avatar avatar-${memberIdx(e.user_name)}" style="width:36px;height:36px;font-size:.9rem;margin:0">${e.user_name[0]}</div>
          <span style="font-weight:700">${e.user_name}</span>
        </div>
        <span style="font-weight:800;font-size:1.1rem;color:var(--gold)">${e.score>=0?'+':''}${e.score} pts</span>
      </div>
      <div style="font-size:.82rem;color:var(--muted);display:grid;grid-template-columns:1fr 1fr;gap:8px 16px">
        <div><strong style="color:var(--text)">Reels:</strong> ${e.reels}</div>
        <div><strong style="color:var(--text)">Sprints:</strong> ${e.sprints}</div>
        <div><strong style="color:var(--text)">Carrosseis:</strong> ${e.carrosseis}</div>
        <div><strong style="color:var(--text)">Prazo:</strong> <span class="badge ${DEADLINE_BADGES[e.deadline_status]}">${DEADLINE_LABELS[e.deadline_status]}</span></div>
        <div><strong style="color:var(--text)">Esfoco:</strong> ${e.effort_score}/10</div>
        <div><strong style="color:var(--text)">Maximo:</strong> ${e.gave_max==='yes'?'Sim':'Poderia mais'}</div>
      </div>
      ${e.what_did?`<div style="margin-top:10px;font-size:.82rem"><strong style="color:var(--muted);display:block;margin-bottom:2px">O que fez:</strong>${e.what_did}</div>`:''}
      ${e.new_idea&&e.new_idea_desc?`<div style="margin-top:8px;font-size:.82rem"><strong style="color:var(--gold);display:block;margin-bottom:2px">Ideia nova:</strong>${e.new_idea_desc}</div>`:''}
      ${e.helped_team?`<div style="margin-top:8px;font-size:.82rem"><strong style="color:var(--muted);display:block;margin-bottom:2px">Ajudou:</strong>${e.helped_team}</div>`:''}
      ${e.solved_problem&&e.solved_problem_desc?`<div style="margin-top:8px;font-size:.82rem"><strong style="color:var(--muted);display:block;margin-bottom:2px">Problema resolvido:</strong>${e.solved_problem_desc}</div>`:''}
      ${e.redo_what?`<div style="margin-top:8px;font-size:.82rem"><strong style="color:var(--muted);display:block;margin-bottom:2px">Refaria:</strong>${e.redo_what}</div>`:''}
    </div>`).join('');
}

function renderHistorico() {
  const filters = ['all',...MEMBERS];
  const filterBtns = filters.map(f => `<button class="tab-btn ${f===currentFilter?'active':''}" onclick="setFilter('${f}')">${f==='all'?'Todos':f}</button>`).join('');
  const filtered = currentFilter==='all' ? allEntries : allEntries.filter(e=>e.user_name===currentFilter);

  if (!filtered.length) return `<div class="tabs">${filterBtns}</div><div class="empty">Nenhum registro.</div>`;

  const rows = filtered.map(e => `
    <tr>
      <td style="white-space:nowrap;color:var(--muted)">${new Date(e.date+'T12:00:00').toLocaleDateString('pt-BR')}</td>
      <td><span class="badge badge-${memberIdx(e.user_name)}">${e.user_name}</span></td>
      <td><span class="${e.score>=0?'score-pos':'score-neg'}">${e.score>=0?'+':''}${e.score}</span></td>
      <td style="text-align:center">${e.reels}</td>
      <td style="text-align:center">${e.sprints}</td>
      <td style="text-align:center">${e.carrosseis}</td>
      <td><span class="badge ${DEADLINE_BADGES[e.deadline_status]}">${DEADLINE_LABELS[e.deadline_status]}</span></td>
      <td style="text-align:center">${e.effort_score}/10</td>
      <td style="font-size:.75rem;color:var(--muted)">${e.gave_max==='yes'?'Sim':'Poderia mais'}</td>
      <td style="text-align:center">${e.new_idea?'Sim':'—'}</td>
      <td style="text-align:center">${e.solved_problem?'Sim':'—'}</td>
      <td style="text-align:center">${e.helped_team?'Sim':'—'}</td>
      <td><button onclick="deleteEntry('${e.id}')" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:.8rem;padding:2px 6px;border-radius:4px" onmouseover="this.style.color='var(--red)'" onmouseout="this.style.color='var(--muted)'">x</button></td>
    </tr>`).join('');

  return `
    <div class="tabs">${filterBtns}</div>
    <div class="admin-table-wrap">
      <table>
        <thead><tr><th>Data</th><th>Pessoa</th><th>Pts</th><th>Reels</th><th>Sprints</th><th>Carrosseis</th><th>Prazo</th><th>Esfoco</th><th>Maximo</th><th>Ideia</th><th>Problema</th><th>Ajudou</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <div style="margin-top:10px;color:var(--muted);font-size:.75rem;text-transform:uppercase;letter-spacing:.05em">${filtered.length} registro${filtered.length!==1?'s':''}</div>`;
}

window.deleteEntry = async function(id) {
  if (!confirm('Excluir este registro?')) return;
  await client.from('entries').delete().eq('id', id);
  allEntries = allEntries.filter(e => e.id !== id);
  renderTabs();
};

// Init
if (sessionStorage.getItem('admin_auth')==='1') loadData();
else renderGate();
</script>
</body>
</html>
